included:
  - BrightCursor

excluded:
  - BrightCursor/Assets.xcassets

# Rules that conflict with the project's style or with private-API usage patterns
disabled_rules:
  - todo                        # TODOs in comments are fine
  - trailing_comma              # not enforced in this project

opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - prefer_self_in_static_references
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Line length: private APIs produce long lines, give a generous limit
line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

# Function body: DDC code is inherently dense
function_body_length:
  warning: 80
  error: 120

# File length
file_length:
  warning: 450
  error: 600

# Type body length
type_body_length:
  warning: 350
  error: 500

# Identifier names: allow short names common in low-level/C bridging code
identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - i
    - v
    - w
    - h
    - x
    - y
    - id
    - src
    - tap
    - svc
    - lw

# Allow force-cast only in specific patterns used with private ObjC APIs
force_cast: warning

# Allow force-try sparingly (we don't use it, but keep as warning not error)
force_try: warning

reporter: xcode
