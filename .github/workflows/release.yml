name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # macos-latest ships multiple Xcode versions; pick the newest stable one
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (Release)
        run: |
          xcodebuild \
            -project BrightCursor.xcodeproj \
            -scheme BrightnessJustWorks \
            -configuration Release \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=$RUNNER_TEMP/BJWBuild

      - name: Ad-hoc sign app bundle
        run: |
          codesign --deep --force --sign - \
            "$RUNNER_TEMP/BJWBuild/Release/BrightnessJustWorks.app"

      - name: Build installer pkg
        run: |
          bash installer/build_pkg.sh \
            "$RUNNER_TEMP/BJWBuild/Release" \
            "${{ github.ref_name }}"

      - name: Zip app bundle
        run: |
          ditto -ck --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/BJWBuild/Release/BrightnessJustWorks.app" \
            "$RUNNER_TEMP/BJWBuild/Release/BrightnessJustWorks-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BrightnessJustWorks ${{ github.ref_name }}
          body: |
            ## Install

            ### Easy install (recommended)
            1. Download `BrightnessJustWorks-${{ github.ref_name }}.pkg` below and double-click it.
            2. Follow the installer steps — the app will be placed in `/Applications` and launched automatically.
            3. Grant **Accessibility** access when prompted.

            ### Manual install (zip)
            1. Download `BrightnessJustWorks-${{ github.ref_name }}.zip`, unzip it.
            2. Move `BrightnessJustWorks.app` to `/Applications/`.
            3. Right-click → **Open** → **Open** to bypass the unidentified developer warning.
            4. Grant **Accessibility** access when prompted.

            ## Uninstall
            Open the menu bar icon → **Uninstall…** — this removes the app and revokes its Accessibility permission.

            > **Apple Silicon only** (M series: M1 and later), macOS 12+.
            > This app uses private APIs and is not signed or notarized with an Apple Developer ID.

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what changed.
          files: |
            ${{ runner.temp }}/BJWBuild/Release/BrightnessJustWorks-${{ github.ref_name }}.pkg
            ${{ runner.temp }}/BJWBuild/Release/BrightnessJustWorks-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
